<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarukesh M — AI & Data Science Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<div class="skill-row">
  <div class="skill-meta">
    <span>Python</span>
    <span class="skill-pct">92%</span>
  </div>

  <div class="skill-bar-bg">
    <div class="skill-bar-fill" data-min="60" data-max="92"></div>
  </div>
</div>
<script>

const bars = document.querySelectorAll(".skill-bar-fill");

bars.forEach(bar => {

  let min = parseInt(bar.getAttribute("data-min")) || 50;
  let max = parseInt(bar.getAttribute("data-max")) || 90;

  let current = min;
  let direction = 1;

  function animateBar(){

    current += direction;

    if(current >= max){
      direction = -1;
    }

    if(current <= min){
      direction = 1;
    }

    bar.style.width = current + "%";

    requestAnimationFrame(animateBar);
  }

  animateBar();

});

</script>
</body>
</html>
